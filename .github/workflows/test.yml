name: test

on:
  push:
  pull_request:

jobs:
  deterministic:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run check
      - run: npm --prefix .agents/skills/design/scripts/visual-companion/tests ci
      - run: npm --prefix .agents/skills/design/scripts/visual-companion test
      - if: runner.os == 'Windows'
        shell: pwsh
        run: npm --prefix .agents/skills/design/scripts/visual-companion run test:powershell
